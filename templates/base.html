<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>Equipos Liga MX</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <!-- Bulma CDN -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bulma@0.9.4/css/bulma.min.css">

</head>
<body>
<section class="section">
  <div class="container">
    <h1 class="title">Equipos - Liga MX</h1>
    {% with messages = get_flashed_messages(with_categories=true) %}
      {% if messages %}
        {% for category, msg in messages %}
          <div class="notification is-{{ 'success' if category=='success' else 'info' if category=='info' else 'warning' }}">
            {{ msg }}
          </div>
        {% endfor %}
      {% endif %}
    {% endwith %}
    {% block content %}{% endblock %}
  </div>
</section>
</body>
</html>
